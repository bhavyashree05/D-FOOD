<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-FOOD | Profile</title>
  <style>
    :root { --maroon:#6B1F1F; --brown:#8B5E3C; --cream:#FFF8F0; --gold:#C9A227; --white:#fff; --text:#2e221b; }
    *{box-sizing:border-box;font-family:Inter,Segoe UI,sans-serif} body{margin:0;background:var(--cream);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}.nav{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:var(--white);border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
    .nav a{color:var(--maroon);font-weight:700;text-decoration:none}.card{background:var(--white);border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.06);margin-top:20px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.field{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}.field input,.field textarea{padding:12px;border:1px solid #e2c6a0;border-radius:12px;background:#fff8f0}.btn{background:linear-gradient(135deg,var(--maroon),var(--brown));color:white;padding:12px 16px;border:none;border-radius:999px;cursor:pointer}
    .pill{display:inline-block;background:#fbe7c6;color:var(--brown);padding:7px 12px;border-radius:999px;font-weight:700;margin-bottom:10px}
    @media (max-width:720px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav">
      <div><strong>D-FOOD</strong></div>
      <div><a href="/">Home</a> · <a href="/logout">Logout</a></div>
    </nav>
    <div class="card">
      <span class="pill">Profile Center</span>
      <h2>Manage your account</h2>
      <form action="/profile/update" method="post" enctype="multipart/form-data" class="grid">
        <div>
          <div class="field"><label>Name</label><input name="name" value="{{ user[1] if user else '' }}" required></div>
          <div class="field"><label>Email</label><input name="email" value="{{ user[2] if user else '' }}" required></div>
          <div class="field"><label>Phone</label><input name="phone" value="{{ user[4] if user and user[4] is not none else '' }}"></div>
          <div class="field"><label>Address</label><textarea name="address">{{ user[5] if user and user[5] is not none else '' }}</textarea></div>
        </div>
        <div>
          <div class="field"><label>New Password</label><input type="password" name="password" placeholder="Leave blank to keep current"></div>
          <div class="field"><label>Upload Photo</label><input type="file" name="photo"></div>
          <button class="btn" type="submit">Save Profile</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
