<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | D-FOOD</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root { --maroon:#6B1F1F; --maroon-dark:#4E1515; --brown:#8B5E3C; --cream:#FFF8F0; --gold:#C9A227; --white:#fff; --text:#2b221d; --muted:#6f5849; --border:rgba(107,31,31,0.10); --shadow:0 20px 45px rgba(107,31,31,0.14); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:Inter,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#fff8f0 0%,#f3ddb8 100%); color:var(--text); position:relative; overflow:hidden; }
    .dots-deco { position:absolute; top:40px; right:60px; width:140px; height:100px; background-image:radial-gradient(var(--gold) 1.8px, transparent 1.8px); background-size:16px 16px; opacity:0.35; }
    .dots-deco.bottom { top:auto; bottom:40px; left:60px; right:auto; }
    .login-box { width:min(420px,92vw); background:var(--white); border:1px solid var(--border); box-shadow:var(--shadow); border-radius:26px; padding:36px 32px; position:relative; z-index:2; animation:fadeUp .5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .icon-badge { width:62px; height:62px; border-radius:50%; background:var(--maroon); color:var(--gold); display:flex; align-items:center; justify-content:center; font-size:1.5rem; margin:0 auto 18px; }
    .title { font-size:1.5rem; font-weight:800; color:var(--maroon); text-align:center; margin-bottom:6px; }
    .sub { color:var(--muted); text-align:center; margin-bottom:22px; font-size:0.92rem; }
    .field { display:flex; flex-direction:column; gap:8px; margin-top:16px; }
    .field label { font-weight:700; font-size:0.86rem; }
    .input-wrap { display:flex; align-items:center; border:1px solid var(--border); border-radius:12px; background:#fffdf9; overflow:hidden; transition:border-color .2s ease, box-shadow .2s ease; }
    .input-wrap:focus-within { border-color:var(--maroon); box-shadow:0 0 0 3px rgba(107,31,31,0.08); }
    .input-icon { width:42px; height:42px; flex-shrink:0; background:var(--maroon); color:var(--gold); display:flex; align-items:center; justify-content:center; }
    .input-wrap input { border:none; outline:none; background:transparent; padding:11px 12px; font-size:0.95rem; width:100%; font-family:inherit; }
    button.btn { margin-top:24px; width:100%; padding:14px; border:none; border-radius:12px; background:linear-gradient(120deg,var(--maroon-dark),var(--maroon)); color:#fff; font-weight:700; font-size:1rem; cursor:pointer; box-shadow:0 16px 30px rgba(107,31,31,0.28); transition:transform .2s ease; }
    button.btn:hover { transform:translateY(-2px); }
    .back-home { display:block; text-align:center; margin-top:18px; color:var(--muted); font-size:0.85rem; }
    .back-home a { color:var(--maroon); font-weight:700; text-decoration:none; }
</style>
</head>
<body>
    <div class="dots-deco"></div>
    <div class="dots-deco bottom"></div>
    <div class="login-box">
        <div class="icon-badge"><i class="fas fa-user-shield"></i></div>
        <div class="title">D-FOOD Admin</div>
        <div class="sub">Secure administrator access for donation management.</div>
        <form method="post">
            <div class="field">
                <label>Username</label>
                <div class="input-wrap"><span class="input-icon"><i class="fas fa-user"></i></span><input type="text" name="username" placeholder="Enter username" required></div>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="input-wrap"><span class="input-icon"><i class="fas fa-lock"></i></span><input type="password" name="password" placeholder="Enter password" required></div>
            </div>
            <button class="btn" type="submit">Login</button>
        </form>
        <div class="back-home">Not an admin? <a href="/">Return home</a></div>
    </div>
    {% if msg %}<script>alert("{{ msg }}");</script>{% endif %}
</body>
</html>
