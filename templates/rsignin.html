<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiver Sign In | D-FOOD</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root { --maroon:#6B1F1F; --maroon-dark:#4E1515; --brown:#8B5E3C; --cream:#FFF8F0; --gold:#C9A227; --white:#fff; --text:#2b221d; --muted:#6f5849; --border:rgba(107,31,31,0.10); --shadow:0 20px 45px rgba(107,31,31,0.14); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:Inter,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#fff8f0 0%,#f3ddb8 100%); color:var(--text); padding:24px; }
    .page { width:min(960px,96vw); display:grid; grid-template-columns:1.05fr 0.95fr; background:var(--white); border-radius:28px; overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--border); animation:fadeUp .5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .hero { background:linear-gradient(160deg,var(--maroon) 0%,var(--maroon-dark) 100%); color:#fff; padding:44px 38px; display:flex; flex-direction:column; justify-content:center; position:relative; overflow:hidden; }
    .hero .dots-deco { position:absolute; bottom:24px; right:24px; width:120px; height:80px; background-image:radial-gradient(var(--gold) 1.8px, transparent 1.8px); background-size:16px 16px; opacity:0.3; }
    .hero-icon { width:56px; height:56px; border-radius:16px; background:rgba(255,255,255,0.12); color:var(--gold); display:flex; align-items:center; justify-content:center; font-size:1.4rem; margin-bottom:20px; }
    .hero h1 { margin:0 0 12px; font-size:1.9rem; }
    .hero p { margin:0; color:rgba(255,255,255,0.85); line-height:1.7; font-size:0.96rem; }
    .brand { position:absolute; top:32px; left:38px; font-weight:800; color:var(--gold); letter-spacing:0.5px; }

    .panel { padding:44px 40px; display:flex; flex-direction:column; justify-content:center; }
    .panel h2 { margin:0 0 6px; color:var(--maroon); font-size:1.4rem; }
    .panel .sub { color:var(--muted); margin-bottom:20px; font-size:0.9rem; }
    .field { display:flex; flex-direction:column; gap:8px; margin-top:14px; }
    .field label { font-weight:700; font-size:0.86rem; }
    .input-wrap { display:flex; align-items:center; border:1px solid var(--border); border-radius:12px; background:#fffdf9; overflow:hidden; transition:border-color .2s ease, box-shadow .2s ease; }
    .input-wrap:focus-within { border-color:var(--maroon); box-shadow:0 0 0 3px rgba(107,31,31,0.08); }
    .input-icon { width:42px; height:42px; flex-shrink:0; background:var(--maroon); color:var(--gold); display:flex; align-items:center; justify-content:center; }
    .input-wrap input { border:none; outline:none; background:transparent; padding:11px 12px; font-size:0.95rem; width:100%; font-family:inherit; }
    .row { display:flex; align-items:center; justify-content:space-between; margin-top:12px; font-size:0.86rem; color:var(--muted); }
    .row a { color:var(--maroon); font-weight:700; text-decoration:none; }
    button.btn { margin-top:20px; width:100%; padding:14px; border:none; border-radius:12px; background:linear-gradient(120deg,var(--maroon-dark),var(--maroon)); color:#fff; font-weight:700; font-size:1rem; cursor:pointer; box-shadow:0 16px 30px rgba(107,31,31,0.28); transition:transform .2s ease; }
    button.btn:hover { transform:translateY(-2px); }
    .switch { text-align:center; margin-top:16px; color:var(--muted); font-size:0.9rem; }
    .switch a { color:var(--maroon); font-weight:700; text-decoration:none; }

    @media (max-width:820px) { .page { grid-template-columns:1fr; } .hero { padding:32px 28px 16px; } .brand { position:static; margin-bottom:16px; display:block; } .panel { padding:28px; } }
</style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <div class="brand">D-FOOD</div>
            <div class="hero-icon"><i class="fas fa-user-group"></i></div>
            <h1>Receiver Sign In</h1>
            <p>Access approved food requests and discover available donations through a safe, efficient portal.</p>
            <div class="dots-deco"></div>
        </div>
        <div class="panel">
            <h2>Welcome back</h2>
            <div class="sub">Sign in to browse and request food donations.</div>
            <form action="/rsignin" method="post">
                <div class="field">
                    <label>Email</label>
                    <div class="input-wrap"><span class="input-icon"><i class="fas fa-envelope"></i></span><input type="email" name="email" placeholder="Enter your email" required></div>
                </div>
                <div class="field">
                    <label>Password</label>
                    <div class="input-wrap"><span class="input-icon"><i class="fas fa-lock"></i></span><input type="password" id="password" name="password" placeholder="Enter your password" required></div>
                </div>
                <div class="row"><label><input type="checkbox"> Remember me</label><a href="#">Forgot password?</a></div>
                <button class="btn" type="submit">Sign In</button>
            </form>
            <div class="switch">Need an account? <a href="/rsignup">Create one</a></div>
        </div>
    </div>
    {% if msg %}<script>alert("{{ msg }}");</script>{% endif %}
</body>
</html>
