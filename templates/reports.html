<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-FOOD | Reports</title>
  <style>
    :root{--maroon:#6B1F1F;--brown:#8B5E3C;--cream:#FFF8F0;--gold:#C9A227;--white:#fff;--text:#2d211d;--muted:#6f5849}
    *{box-sizing:border-box;font-family:Inter,Segoe UI,sans-serif} body{margin:0;background:var(--cream);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}.card{background:var(--white);border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.06);margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.stat{padding:18px;border-radius:18px;background:#fdf1e3}.stat strong{display:block;font-size:1.8rem;color:var(--maroon)}
    a{color:var(--maroon);font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>D-FOOD Reports</h2>
      <p>Professional summaries to help the admin monitor donation activity.</p>
    </div>
    <div class="grid">
      <div class="stat"><strong>{{ daily }}</strong><span>Daily Requests</span></div>
      <div class="stat"><strong>{{ weekly }}</strong><span>Weekly Requests</span></div>
      <div class="stat"><strong>{{ monthly }}</strong><span>Monthly Requests</span></div>
      <div class="stat"><strong>{{ donation_count }}</strong><span>Donation Report</span></div>
      <div class="stat"><strong>{{ receiver_count }}</strong><span>Receiver Report</span></div>
      <div class="stat"><strong>{{ donation_count }}</strong><span>Overall Activity</span></div>
    </div>
    <div class="card"><a href="/admin_dashboard">← Back to dashboard</a></div>
  </div>
</body>
</html>
