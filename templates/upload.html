<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeding Humanity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url("https://img.freepik.com/free-photo/top-view-food-donation-box_23-2148733850.jpg?t=st=1745575805~exp=1745579405~hmac=d23ac5614de4ca9f09de673d37971db626bc77336482c999e84663d6e4d3af64&w=996");
            background-size: 100% 100vh;
            background-attachment: fixed;
        }
        .navbar {
            width: 100%;
            background: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .navbar .logo {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        .navbar .nav-links {
            display: flex;
            gap: 15px;
        }
        .navbar .nav-links a {
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
        }
        .navbar .nav-links a:hover {
            color: #5642a6;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-top: 50px;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        .btn {
            width: 100%;
            background: #667eea;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background: #5642a6;
        }
        .book-list {
            margin-top: 30px;
            width: 100%;
            max-width: 600px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .book {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .book:last-child {
            border-bottom: none;
        }
        @media (max-width: 480px) {
            .container, .book-list {
                padding: 15px;
            }
            .navbar {
                flex-direction: column;
                align-items: center;
            }
            .navbar .nav-links {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Feeding Humanity</div>
        <div class="nav-links">
            <a href="/upload">upload</a>
            <a href="/booklist">Donations</a>
            <a href="/">Logout</a>
        </div>
    </nav>
    
    <!-- Admin Side: Upload Book -->
    <div class="container">
        <h2>Upload Food Details</h2>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <!-- Added Donor Name -->
            <div class="input-group">
                <label for="donor-name">Donor Name</label>
                <input type="text" id="donor-name" name="donor_name" placeholder="Enter donor name" required>
            </div>

            <div class="input-group">
                <label for="food-name">Food Name</label>
                <input type="text" id="food-name" name="food_name" placeholder="Enter food name" required>
            </div>
            <div class="input-group">
                <label for="quantity">Quantity (kg/liters)</label>
                <input type="text" id="quantity" name="quantity" placeholder="Enter quantity" required>
            </div>
            <div class="input-group">
                <label for="donation-date">Donation Date</label>
                <input type="date" id="donation-date" name="expiry_date" required>
            </div>
            <div class="input-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="Vegetarian">Vegetarian</option>
                    <option value="Non-Vegetarian">Non-Vegetarian</option>
                </select>
            </div>
            <div class="input-group">
                <label for="location">Pickup Location</label>
                <input type="text" id="location" name="pickup_location" placeholder="Enter pickup location" required>
            </div>
            <div class="input-group">
                <label for="phone">Doner phone</label>
                <input type="text" id="phone" name="phone" placeholder="Enter phone" required>
            </div>
            <div class="input-group">
                <label for="food-image">Food Image</label>
                <input type="file" id="food-image" accept="image/*" name="image" required>
            </div>
            <button type="submit" class="btn">Donate Food</button>
        </form>        
    </div>

</body>
</html>
